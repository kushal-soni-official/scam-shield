<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScamShield - AI Scam Detector 2026</title>

    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Font Awesome 6.5.0 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avbj0r6v2Fd0B6fHg9X8p3U2wZf3j3X2z0k6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6X5Y6" crossorigin="anonymous">

    <!-- Google Fonts: Inter + Plus Jakarta Sans (modern alternatives) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ---------- DESIGN SYSTEM TOKENS ---------- */
        :root {
            /* Colors */
            --bg-primary: #0a0c10;
            --bg-secondary: #111318;
            --card-bg: rgba(20, 24, 32, 0.85);
            --card-border: rgba(48, 54, 68, 0.5);
            --text-primary: #f0f3fa;
            --text-secondary: #9ca3b3;
            --accent-blue: #3b82f6;
            --accent-blue-rgb: 59, 130, 246;
            --accent-blue-hover: #2563eb;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #fd7e14;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(59, 130, 246, 0.2);
            --shadow-sm: 0 8px 20px rgba(0,0,0,0.2);
            --shadow-md: 0 12px 30px rgba(0,0,0,0.25);
            --shadow-glow: 0 0 15px rgba(59,130,246,0.3);
            
            /* Typography */
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-display: 'Plus Jakarta Sans', var(--font-sans);
            --font-mono: 'SF Mono', monospace;
            
            /* Spacing */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-12: 3rem;
            
            /* Transitions */
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.4s ease;
            
            /* Border radius */
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;
        }

        /* ---------- GLOBAL RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, var(--bg-primary) 0%, #07090e 100%);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-weight: 400;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---------- SIDEBAR (GLASS + ANIMATED) ---------- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: rgba(10, 12, 18, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--glass-border);
            padding: var(--space-8) var(--space-4);
            display: flex;
            flex-direction: column;
            transition: all var(--transition-normal);
            z-index: 1000;
        }

        .sidebar h4 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.75rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent-blue) 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: var(--space-8);
            letter-spacing: -0.02em;
            text-align: center;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            margin: var(--space-1) 0;
            color: var(--text-secondary);
            font-weight: 500;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            text-decoration: none;
        }

        .sidebar a i {
            width: 24px;
            font-size: 1.2rem;
            transition: transform var(--transition-fast);
        }

        .sidebar a:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
            transform: translateX(4px);
        }

        .sidebar a:hover i {
            transform: translateX(2px);
            color: var(--accent-blue);
        }

        .sidebar a.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, rgba(59, 130, 246, 0.05) 100%);
            color: var(--accent-blue);
            border-left: 3px solid var(--accent-blue);
        }

        .sidebar hr {
            margin: var(--space-6) 0;
            border-color: rgba(255,255,255,0.1);
        }

        /* ---------- MAIN CONTENT AREA ---------- */
        .content {
            margin-left: 280px;
            padding: var(--space-8) var(--space-12);
            min-height: 100vh;
            transition: margin-left var(--transition-normal);
        }

        /* ---------- MODERN CARD DESIGN (GLASSMORPHISM) ---------- */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-normal), box-shadow var(--transition-normal);
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--card-border);
            padding: var(--space-4) var(--space-6);
            font-weight: 600;
        }

        .card-header.bg-dark {
            background: rgba(0,0,0,0.3) !important;
        }

        .card-body {
            padding: var(--space-6);
        }

        /* ---------- FORM ELEMENTS ---------- */
        .form-control, .form-select {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            transition: all var(--transition-fast);
        }

        .form-control:focus, .form-select:focus {
            background: rgba(0,0,0,0.6);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(var(--accent-blue-rgb), 0.2);
            outline: none;
        }

        /* ---------- BUTTONS ---------- */
        .btn {
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-6);
            font-weight: 500;
            transition: all var(--transition-fast);
        }

        .btn-primary {
            background: var(--accent-blue);
            border: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-blue-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }

        .btn-outline-secondary {
            border-color: var(--card-border);
            color: var(--text-secondary);
        }

        .btn-outline-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        /* ---------- TABLES ---------- */
        .table {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-primary);
            --bs-table-border-color: var(--card-border);
        }

        .table th {
            background: rgba(59, 130, 246, 0.2);
            color: var(--text-primary);
            font-weight: 600;
            border-bottom-width: 1px;
        }

        .table-hover tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        /* ---------- CUSTOM UTILITY CLASSES ---------- */
        .scam { color: var(--accent-red) !important; font-weight: 700; }
        .legitimate { color: var(--accent-green) !important; font-weight: 700; }
        .low-conf { color: var(--accent-orange) !important; font-weight: 700; }

        .chart-container {
            height: 380px;
            width: 100%;
            position: relative;
        }

        .text-muted, .text-secondary {
            color: var(--text-secondary) !important;
        }

        /* ---------- RESPONSIVE ADJUSTMENTS ---------- */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                padding: var(--space-4);
                backdrop-filter: blur(12px);
                border-right: none;
                border-bottom: 1px solid var(--glass-border);
            }
            .sidebar h4 {
                width: 100%;
                margin-bottom: var(--space-4);
            }
            .sidebar a {
                flex: 0 0 auto;
                margin: 0 var(--space-2);
            }
            .sidebar hr {
                display: none;
            }
            .content {
                margin-left: 0;
                padding: var(--space-4);
            }
        }

        /* ---------- SCROLLBAR (optional) ---------- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-blue-hover);
        }
		
		.footer {
            font-size: 0.85rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .footer:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-center fw-bold">
            ScamShield
        </h4>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>
            <i class="fas fa-search me-2"></i> Classify
        </a>
        <a href="/dashboard" {% if request.path == '/dashboard' %}class="active"{% endif %}>
            <i class="fas fa-chart-line me-2"></i> Dashboard
        </a>
        <a href="/history" {% if request.path == '/history' %}class="active"{% endif %}>
            <i class="fas fa-history me-2"></i> History
        </a>
        <a href="/about" {% if request.path == '/about' %}class="active"{% endif %}>
            <i class="fas fa-info-circle me-2"></i> About
        </a>
        <hr class="my-3">
        <!-- No toggle - dark mode only -->
    </div>

    <div class="content">
        {% block content %}{% endblock %}
		
		<footer class="footer mt-5 pt-3 border-top">
        <div class="container-fluid px-0">
            <div class="row">
                <div class="col-12 text-center text-muted small">
                    &copy; 2026 Kushal Soni. All rights reserved.
                </div>
            </div>
        </div>
        </footer>

    </div>

</body>
</html>
